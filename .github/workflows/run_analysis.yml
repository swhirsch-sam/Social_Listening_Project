name: Run Brand Analysis

on:
  workflow_dispatch:
    inputs:
      brand_name:
        description: 'Brand name to analyze (e.g. Tesla, Nike, Apple)'
        required: true
        type: string
      context_hint:
        description: 'Optional context hint to focus the search (e.g. car company, sportswear)'
        required: false
        default: ''
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run brand analysis
        env:
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAND_NAME: ${{ github.event.inputs.brand_name }}
          CONTEXT_HINT: ${{ github.event.inputs.context_hint }}
        run: |
          python - <<'EOF'
          import os
          import json
          import config
          import main as analyzer

          # Inject secrets into config at runtime
          config.APIFY_API_KEY = os.environ['APIFY_API_KEY']
          config.ANTHROPIC_API_KEY = os.environ['ANTHROPIC_API_KEY']

          brand = os.environ['BRAND_NAME']
          context = os.environ.get('CONTEXT_HINT', '')

          print(f'Starting analysis for brand: {brand}')
          if context:
              print(f'Context hint: {context}')

          result = analyzer.run_analysis(brand, context)

          if 'error' in result:
              print(f'ERROR: {result["error"]}')
              raise SystemExit(1)

          print('\n=== RESULTS ===')
          print(f'Brand: {result["brand"]}')
          print(f'Total posts analyzed: {result["total"]}')
          print(f'Dominant sentiment: {result["dominant"]} ({result["agreement"]:.0%} agreement)')
          print(f'Positive: {result["counts"]["positive"]}')
          print(f'Negative: {result["counts"]["negative"]}')
          print(f'Neutral:  {result["counts"]["neutral"]}')
          if result.get('top_positive_terms'):
              print(f'Top positive terms: {result["top_positive_terms"]}')
          if result.get('top_negative_terms'):
              print(f'Top negative terms: {result["top_negative_terms"]}')
          print('\nPlatform breakdown:')
          for platform, data in result.get('platform_breakdown', {}).items():
              print(f'  {platform}: {data["total"]} posts ({data["positive"]}+ {data["negative"]}- {data["neutral"]}~)')
          EOF
