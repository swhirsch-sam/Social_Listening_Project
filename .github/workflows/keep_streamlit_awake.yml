name: Keep Streamlit Awake

# Pings the deployed Streamlit app so Streamlit Community Cloud does not put it
# to sleep. See .github/scripts/keep_awake.py for why a real browser (not a
# plain curl) is used.

on:
  schedule:
    # Runs at 00:00, 10:00 and 20:00 UTC -> never more than 10 hours asleep.
    # Note: GitHub may delay scheduled runs under load, and it disables
    # scheduled workflows after 60 days of no repo activity.
    - cron: "0 0,10,20 * * *"
  workflow_dispatch:
    inputs:
      app_url:
        description: "Override the Streamlit app URL for a one-off manual run"
        required: false
        default: ""

# Never let two keep-alive runs overlap.
concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright (Chromium)
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Resolve app URL
        run: |
          # Precedence: manual input > repo variable > hardcoded default.
          # To hardcode instead of using the variable, put the URL in DEFAULT.
          INPUT_URL="${{ github.event.inputs.app_url }}"
          VAR_URL="${{ vars.STREAMLIT_APP_URL }}"
          DEFAULT=""
          URL="${INPUT_URL:-${VAR_URL:-$DEFAULT}}"
          if [ -z "$URL" ]; then
            echo "::error::No app URL. Set the repository variable STREAMLIT_APP_URL (Settings -> Secrets and variables -> Actions -> Variables) or run manually with an app_url input."
            exit 1
          fi
          echo "STREAMLIT_APP_URL=$URL" >> "$GITHUB_ENV"
          echo "Using app URL: $URL"

      - name: Ping app to keep it awake
        run: python .github/scripts/keep_awake.py
